<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.Scharmüller - UniTiles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <button id="back-btn" class="nav-button" style="display: none;" title="Indietro">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24px" height="24px"><path d="M12.707 17.293 8.414 13H18v-2H8.414l4.293-4.293-1.414-1.414L4.586 12l6.707 6.707z"/></svg>
            </button>
            <h1>A.Scharmüller - UniTiles</h1>
        </div>
        <div class="header-controls">
            <button id="add-tile-btn" class="add-button">+</button>
            <input type="text" id="search-input" placeholder="Cerca..." class="search-bar">
        </div>
    </header>

    <main class="tile-grid-container">
        <div id="tiles-grid" class="tile-grid">
            <!-- Tiles will be rendered here by app.js -->
        </div>
    </main>

    <dialog id="add-tile-dialog">
        <h2>Aggiungi Nuovo Tile</h2>
        <form id="tile-form">
            <div class="form-group">
                <label for="tile-title">Titolo:</label>
                <input type="text" id="tile-title" required>
            </div>
            <div class="form-group">
                <label for="tile-subtitle">Sottotitolo:</label>
                <input type="text" id="tile-subtitle">
            </div>
            <div class="form-group">
                <label for="tile-type">Tipo:</label>
                <select id="tile-type" required>
                    <option value="">Seleziona un tipo</option>
                    <option value="url">URL</option>
                    <option value="exe">Eseguibile (.exe)</option>
                    <option value="command">Comando</option>
                    <option value="file">File Locale</option>
                    <option value="folder">Cartella</option>
                </select>
            </div>

            <div id="dynamic-fields">
                <!-- Dynamic fields based on tile type will be inserted here -->
            </div>

            <div class="form-group">
                <label for="tile-color">Colore di Sfondo (es. #RRGGBB o nome):</label>
                <input type="text" id="tile-color" placeholder="#333333 o red">
            </div>
            <div class="form-group">
                <label for="tile-image">Immagine di Sfondo (URL o percorso locale):</label>
                <input type="text" id="tile-image" placeholder="https://example.com/image.png o C:\\path\\to\\image.png">
            </div>

            <div class="form-actions">
                <button type="submit">Salva Tile</button>
                <button type="button" id="cancel-add-tile-btn">Annulla</button>
            </div>
        </form>
    </dialog>

    <div id="calendar-popup" class="calendar-popup" style="display: none;">
        <div class="calendar-header">
            <button id="prev-month">&lt;</button>
            <span id="calendar-month-year"></span>
            <button id="next-month">&gt;</button>
        </div>
        <div class="calendar-days-header"></div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>

    <footer class="app-footer">
        <div id="date-display" class="footer-item"></div>
        <textarea id="terminal-input" class="footer-item terminal-input" placeholder=">_"></textarea>
        <button id="save-note-btn" class="footer-item nav-button" style="width: 35px; height: 35px; font-size: 1.2em; margin-left: 10px; background-color: #333;" title="Salva nota del giorno">💾</button>
        <button id="open-notes-btn" class="footer-item nav-button" style="width: 35px; height: 35px; font-size: 1.2em; margin-left: 5px; background-color: #333;" title="Apri cartella note">📂</button>
        <div id="clock-display" class="footer-item"></div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
